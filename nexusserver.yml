name: NexusServer 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Every hour

jobs:
  run-server:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM + Check Specs
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -aG kvm $USER
          ls -la /dev/kvm
          echo "=== Runner Specs ==="
          nproc
          free -h
          df -h
          echo "===================="

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            qemu-kvm \
            openssh-client \
            sshpass \
            git-lfs \
            curl wget \
            net-tools \
            socat

      - name: Download VM Image from Hugging Face
        run: |
          echo "Downloading VM image..."
          git lfs install
          git clone https://Paul1212crp:${{ secrets.HF_TOKEN }}@huggingface.co/datasets/Paul1212crp/nexusserver-vm /tmp/nexusserver-vm
          mkdir -p ~/vms
          cp /tmp/nexusserver-vm/nexusserver.img.compressed ~/vms/nexusserver.img
          echo "Ready: $(du -sh ~/vms/nexusserver.img)"
          qemu-img info ~/vms/nexusserver.img
          df -h

      - name: Boot VM
        run: |
          sudo chmod 666 /dev/kvm

          TOTAL_RAM=$(free -m | awk '/^Mem:/{print $2}')
          VM_RAM=$(( TOTAL_RAM * 85 / 100 ))
          CPUS=$(nproc)
          echo "Total RAM: ${TOTAL_RAM}MB — Giving VM: ${VM_RAM}MB"
          echo "Total CPUs: ${CPUS} — Giving VM: ${CPUS}"

          qemu-system-x86_64 \
            -enable-kvm \
            -machine q35,mem-merge=off \
            -m ${VM_RAM} \
            -smp ${CPUS} \
            -cpu host,+x2apic \
            -drive file=$HOME/vms/nexusserver.img,format=qcow2,if=virtio,cache=writeback,discard=unmap,aio=threads \
            -boot order=c \
            -device virtio-net-pci,netdev=n0 \
            -netdev user,id=n0,hostfwd=tcp::2222-:22,hostfwd=tcp::8443-:8443,hostfwd=tcp::8080-:8080,hostfwd=tcp::3000-:3000,hostfwd=tcp::2055-:2055 \
            -object rng-random,filename=/dev/urandom,id=rng0 \
            -device virtio-rng-pci,rng=rng0 \
            -device virtio-balloon-pci \
            -serial file:$HOME/vms/nexusserver.serial.log \
            -monitor unix:$HOME/vms/nexusserver.monitor,server,nowait \
            -display none \
            -daemonize \
            -pidfile $HOME/vms/nexusserver.pid
          echo "VM booting with ${VM_RAM}MB RAM and ${CPUS} CPUs!"

      - name: Wait for SSH
        run: |
          echo "Waiting for VM SSH..."
          for i in {1..60}; do
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" \
               ssh -o StrictHostKeyChecking=no \
                   -o UserKnownHostsFile=/dev/null \
                   -o ConnectTimeout=5 \
                   -p 2222 nexus@localhost \
                   "echo SSH_READY" 2>/dev/null | grep -q "SSH_READY"; then
              echo "VM is up after ${i}0 seconds!"
              break
            fi
            echo "Attempt $i/60 - waiting 10s..."
            sleep 10
            tail -3 $HOME/vms/nexusserver.serial.log 2>/dev/null || true
          done

      - name: Restore from Dropbox + Start All Services
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              -p 2222 nexus@localhost bash << 'ENDSSH'

          echo "=== System Info ==="
          free -h
          nproc
          df -h /

          echo "=== Checking Dropbox for new files ==="
          if command -v rclone &>/dev/null && rclone listremotes 2>/dev/null | grep -q "backup:"; then
            FILE_COUNT=$(rclone ls backup:nexus-volumes 2>/dev/null | wc -l)
            echo "Files in Dropbox: $FILE_COUNT"

            if [[ "$FILE_COUNT" -gt 0 ]]; then
              echo "✅ Found $FILE_COUNT new files in Dropbox — restoring..."
              sudo systemctl stop wings 2>/dev/null || true
              sleep 2

              rclone sync backup:nexus-volumes /var/lib/pelican/volumes \
                --copy-links \
                --exclude "node_modules/**" \
                --exclude ".git/**" \
                --exclude ".npm/**" \
                --exclude "*.log" \
                2>&1 | tail -3

              echo "✅ Dropbox files restored!"

              echo "Clearing Dropbox for next cycle..."
              rclone delete backup:nexus-volumes 2>/dev/null || true
              rclone rmdir backup:nexus-volumes 2>/dev/null || true
              rclone mkdir backup:nexus-volumes 2>/dev/null || true
              echo "✅ Dropbox cleared!"
            else
              echo "✅ Dropbox is empty — using VM image files as-is"
            fi
          else
            echo "⚠️ rclone not configured — using VM image files"
          fi

          echo "=== Fixing Nginx ==="
          sed -i '/# Disable caching for Livewire/,/^}/d' /etc/nginx/sites-available/pelican.conf 2>/dev/null || true
          nginx -t && systemctl restart nginx || true

          echo "=== Connecting Tailscale ==="
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=nexusserver-gha \
            --accept-routes 2>/dev/null || true
          sleep 3
          echo "Tailscale IP: $(tailscale ip -4 2>/dev/null || echo pending)"

          echo "=== Starting sshx ==="
          pkill sshx 2>/dev/null || true
          nohup sshx > /tmp/sshx.log 2>&1 &
          sleep 5
          SSHX_LINK=$(grep -o 'https://sshx.io/s/[^ #]*' /tmp/sshx.log 2>/dev/null | tail -1 || echo "starting...")
          echo "sshx link: $SSHX_LINK"

          echo "=== Checking Pelican Config ==="
          if [[ -f /root/.pelican.env ]] || [[ -f /var/www/pelican/.env ]]; then
              echo "✅ Pelican config found - starting all services..."
              BASE_URL="https://raw.githubusercontent.com/Adexx-11234/newrepo/main"
              curl -fsSL "${BASE_URL}/restart.sh" -o /tmp/nexus-restart.sh
              sudo bash /tmp/nexus-restart.sh
              rm -f /tmp/nexus-restart.sh
          else
              echo "❌ WARNING: No Pelican config found!"
              ls -la /root/ 2>/dev/null || true
              ls -la /var/www/ 2>/dev/null || true
          fi

          echo "=== Services Status ==="
          sudo systemctl is-active wings nginx php8.3-fpm cloudflared 2>/dev/null || true
          echo "Tailscale IP: $(tailscale ip -4 2>/dev/null || echo not connected)"

          ENDSSH

      - name: 🎉 Show Access Details
        run: |
          sleep 10

          TAILSCALE_IP=$(sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=10 \
                -p 2222 nexus@localhost \
                "tailscale ip -4 2>/dev/null || echo pending" 2>/dev/null)

          SSHX_LINK=$(sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=10 \
                -p 2222 nexus@localhost \
                "grep -o 'https://sshx.io/s/[^ #]*' /tmp/sshx.log 2>/dev/null | tail -1 || echo 'not ready yet'" 2>/dev/null)

          PUBLIC_IP=$(sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=10 \
                -p 2222 nexus@localhost \
                "curl -s ifconfig.me 2>/dev/null" 2>/dev/null)

          echo ""
          echo "╔══════════════════════════════════════════════════╗"
          echo "║       🎉 NEXUSSERVER IS LIVE!                    ║"
          echo "║          Created by NexusTechPro               ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║                                                  ║"
          echo "║  👤  Username:     nexus                         ║"
          echo "║  🔑  Password:     ${{ secrets.SSH_PASSWORD }}"
          echo "║  🌐  Public IP:    ${PUBLIC_IP}"
          echo "║  🔒  Tailscale IP: ${TAILSCALE_IP}"
          echo "║                                                  ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  🌐  Panel:   https://panel.nexusbot.qzz.io      ║"
          echo "║  🌐  Wings:   https://node-1.nexusbot.qzz.io     ║"
          echo "║                                                  ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  🔗  CLICK LINK BELOW TO ACCESS YOUR TERMINAL:  ║"
          echo "║                                                  ║"
          echo "     👉  ${SSHX_LINK}"
          echo "║                                                  ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  🔐  SSH Access (via Tailscale):                 ║"
          echo "║  ssh nexus@${TAILSCALE_IP}                       ║"
          echo "║                                                  ║"
          echo "║  ⏰  VM runs for 4.5 hours then auto-restarts    ║"
          echo "║  💾  Smart Dropbox sync on restart               ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "✅ SERVER IS LIVE! Click the sshx link above!"

      - name: Keep Alive + Smart Backup
        run: |
          echo "Server running! Keeping alive for 4.5 hours..."
          START=$(date +%s)

          for i in {1..27}; do
            sleep 600
            ELAPSED=$(( ($(date +%s) - START) / 60 ))
            echo "[$i/27] Running ${ELAPSED} mins - $(date '+%H:%M:%S')"

            sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=10 \
                -p 2222 nexus@localhost \
                "echo OK && sudo systemctl is-active wings nginx 2>/dev/null && tailscale ip -4 2>/dev/null" \
            2>/dev/null || echo "Health check failed at $i"
          done

          echo "=== 4.5 hours complete — Smart backup starting ==="

          # Step 1 — Flush VM writes
          echo "Step 1: Flushing VM writes..."
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              -p 2222 nexus@localhost \
              "sudo sync" 2>/dev/null || true

          # Step 2 — Pause VM
          echo "Step 2: Pausing VM..."
          echo "stop" | socat - UNIX-CONNECT:$HOME/vms/nexusserver.monitor

          # Step 3 — Copy image (VM stays paused until done)
          echo "Step 3: Copying VM image..."
          cp $HOME/vms/nexusserver.img $HOME/vms/nexusserver.snapshot.img
          echo "✅ Copy done: $(du -sh $HOME/vms/nexusserver.snapshot.img)"

          # Step 4 — Resume VM immediately
          echo "Step 4: Resuming VM..."
          echo "cont" | socat - UNIX-CONNECT:$HOME/vms/nexusserver.monitor
          echo "✅ VM RESUMED!"

          # Step 5 — Start Dropbox sync of NEW files in background
          echo "Step 5: Starting Dropbox sync of new files..."
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              -p 2222 nexus@localhost \
              "nohup rclone sync /var/lib/pelican/volumes backup:nexus-volumes --copy-links --exclude 'node_modules/**' --exclude '.git/**' --exclude '.npm/**' --exclude '*.log' --log-file=/var/log/rclone-backup.log > /dev/null 2>&1 &
               echo 'Dropbox sync started'" \
          2>/dev/null || true

          # Step 6 — Compress snapshot (VM running + Dropbox syncing)
          echo "Step 6: Compressing VM snapshot..."
          qemu-img convert -O qcow2 -c \
            $HOME/vms/nexusserver.snapshot.img \
            /tmp/nexusserver.img.compressed

          # Step 7 — Stop Dropbox sync
          echo "Step 7: Stopping Dropbox sync..."
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=10 \
              -p 2222 nexus@localhost \
              "pkill -f 'rclone sync' 2>/dev/null || true
               echo 'Dropbox sync stopped'
               echo 'Files synced:'
               rclone ls backup:nexus-volumes 2>/dev/null | wc -l" \
          2>/dev/null || true

          # Step 8 — Cleanup
          rm -f $HOME/vms/nexusserver.snapshot.img
          echo "✅ Snapshot: $(du -sh /tmp/nexusserver.img.compressed)"

      - name: Upload Updated Image to Hugging Face
        run: |
          echo "Uploading updated image..."
          cd /tmp/nexusserver-vm

          # Enable large file support on HF repo
          echo "Enabling large file support..."
          curl -s -X POST \
            "https://huggingface.co/api/datasets/Paul1212crp/nexusserver-vm/lfs-enable-largefiles" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" || true

          # Setup git lfs
          git lfs install
          git lfs track "*.compressed"

          cp /tmp/nexusserver.img.compressed ./nexusserver.img.compressed

          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .gitattributes nexusserver.img.compressed
          git commit -m "Auto-save: $(date '+%Y-%m-%d %H:%M:%S')" || echo "Nothing to commit"
          git push || echo "Push failed"
          echo "Done! Next run will use this updated image."
