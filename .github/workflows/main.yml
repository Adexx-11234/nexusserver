name: Check HuggingFace Last Upload

on:
  workflow_dispatch:

jobs:
  check-hf:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check Last Commit on HuggingFace Repo
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub --break-system-packages -q
          python3 - <<'PYEOF'
          import os
          from huggingface_hub import HfApi
          from datetime import datetime, timezone

          api = HfApi(token=os.environ["HF_TOKEN"])

          print("=== Checking HuggingFace Repo ===")

          # Get commit history
          commits = list(api.list_repo_commits(
              repo_id="Paul1212crp/nexusserver-vm",
              repo_type="dataset"
          ))

          latest = commits[0]
          print(f"Total commits: {len(commits)}")
          print(f"Latest commit: {latest.commit_id[:12]}")
          print(f"Message:       {latest.title}")
          print(f"Date:          {latest.created_at}")

          # How long ago
          now = datetime.now(timezone.utc)
          age = now - latest.created_at
          hours = int(age.total_seconds() // 3600)
          mins  = int((age.total_seconds() % 3600) // 60)
          print(f"Age:           {hours}h {mins}m ago")

          # Get file info
          files = list(api.list_repo_tree(
              repo_id="Paul1212crp/nexusserver-vm",
              repo_type="dataset"
          ))
          for f in files:
              if hasattr(f, 'size') and f.size:
                  size_gb = f.size / (1024**3)
                  print(f"\nFile: {f.path}")
                  print(f"Size: {size_gb:.2f} GB ({f.size:,} bytes)")
                  print(f"Blob: {f.blob_id[:12] if f.blob_id else 'N/A'}")

          print("\n=== Check Complete ===")
          if "Auto-save" in latest.title or "Backup" in latest.title:
              print("✅ Latest commit looks like an auto-save from the workflow!")
          else:
              print("⚠️  Latest commit does NOT look like an auto-save - upload may have failed.")
          PYEOF
